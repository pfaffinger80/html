<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Color Picker</title>
    <style>
        :root {
            --bg-gray: #f4f4f7;
            --panel-bg: #ffffff;
            --border-radius: 16px;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        .photo-card {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .canvas-wrapper {
            width: 100%;
            height: 300px;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            background-color: #eee;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            touch-action: none;
        }

        .placeholder-text {
            position: absolute;
            color: #888;
            font-weight: bold;
            pointer-events: none;
            text-align: center;
            padding: 20px;
        }

        .crosshair {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid white;
            border-radius: 50%;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
        }

        .crosshair::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 4px; height: 4px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .button-group {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px 10px;
            border-radius: 20px;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.2s ease;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: scale(1) !important;
        }

        .btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .btn-camera {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
        }

        .btn-share {
            background: linear-gradient(135deg, #2a9d8f, #264653);
            display: none;
        }

        input[type="file"] {
            display: none;
        }

        .palette-card {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .main-preview {
            width: 100%;
            height: 60px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            border: 1px solid rgba(0,0,0,0.1);
            background-color: #cccccc;
        }

        .palette-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .swatch {
            height: 45px;
            width: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            color: #fff;
            font-family: 'SF Mono', monospace;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            border: 1px solid rgba(0,0,0,0.05);
            background-color: #eee;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="photo-card">
        <span class="section-title">Foto & Farbauswahl</span>
        
        <div class="canvas-wrapper" id="canvasWrapper">
            <div class="placeholder-text" id="placeholderText">Kamera öffnen, um ein Foto zu laden</div>
            <canvas id="imageCanvas"></canvas>
            <div class="crosshair" id="crosshair"></div>
        </div>

        <div class="button-group">
            <button class="btn btn-camera" onclick="document.getElementById('cameraInput').click()">
                📷 Kamera
            </button>
            <button class="btn btn-share" id="btnShare" onclick="uploadAndShare()">
                📤 Hochladen & Teilen
            </button>
        </div>
        
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
    </div>

    <div class="palette-card">
        <span class="section-title">Gepickte Farbe</span>
        <div id="mainPreview" class="main-preview">Wähle eine Farbe</div>
        
        <span class="section-title">Harmonische Palette</span>
        <div id="paletteList" class="palette-list">
            <div class="swatch"><span style="color:#888; text-shadow:none;">Warte auf Foto...</span></div>
        </div>
    </div>
</div>

<script>
    // Dein API Key
    const IMGBB_API_KEY = 'db0140da04ee376ddc7621f570fa69e3';

    const cameraInput = document.getElementById('cameraInput');
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const wrapper = document.getElementById('canvasWrapper');
    const placeholderText = document.getElementById('placeholderText');
    const crosshair = document.getElementById('crosshair');
    const btnShare = document.getElementById('btnShare');
    const mainPreview = document.getElementById('mainPreview');
    const paletteList = document.getElementById('paletteList');

    let imageLoaded = false;

    // Kamera-Bild laden
    cameraInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                placeholderText.style.display = 'none';
                crosshair.style.display = 'none';
                btnShare.style.display = 'flex'; 
                imageLoaded = true;

                const rect = wrapper.getBoundingClientRect();
                canvas.width = rect.width;
                canvas.height = rect.height;

                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const w = img.width * scale;
                const h = img.height * scale;
                const x = (canvas.width - w) / 2;
                const y = (canvas.height - h) / 2;

                ctx.drawImage(img, x, y, w, h);
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    // Farbauswahl-Logik
    function pickColor(e) {
        if (!imageLoaded) return;

        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        crosshair.style.display = 'block';
        crosshair.style.left = `${x}px`;
        crosshair.style.top = `${y}px`;

        try {
            const pixel = ctx.getImageData(x, y, 1, 1).data;
            const hex = rgbToHex(pixel[0], pixel[1], pixel[2]);
            const hsl = rgbToHsl(pixel[0], pixel[1], pixel[2]);

            mainPreview.style.backgroundColor = hex;
            mainPreview.textContent = hex;
            updatePalette(hsl);
        } catch (e) {
            console.error("Fehler beim Pixel-Lesen:", e);
        }
    }

    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); pickColor(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); pickColor(e); });
    canvas.addEventListener('mousedown', pickColor);

    // NEU: Upload & Share Funktion mit detaillierter Fehlerprüfung
    async function uploadAndShare() {
        if (!imageLoaded) return;
        
        const originalBtnText = btnShare.innerHTML;
        btnShare.innerHTML = "⏳ Lade hoch...";
        btnShare.disabled = true;

        canvas.toBlob(async (blob) => {
            if (!blob) {
                alert("Fehler: Bild konnte nicht verarbeitet werden.");
                btnShare.innerHTML = originalBtnText;
                btnShare.disabled = false;
                return;
            }

            const formData = new FormData();
            formData.append("image", blob);

            try {
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    const imageUrl = data.data.url;
                    
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: 'Meine Farbanalyse',
                                text: 'Schau dir meine Farbanalyse an!',
                                url: imageUrl
                            });
                        } catch (shareErr) {
                            console.log("Teilen vom User abgebrochen.");
                        }
                    } else {
                        await navigator.clipboard.writeText(imageUrl);
                        alert("Link kopiert!\n" + imageUrl);
                    }
                } else {
                    // Fehlermeldung von imgBB (z.B. falscher Key)
                    alert("imgBB Fehler: " + (data.error ? data.error.message : "Unbekannter Fehler"));
                }
            } catch (error) {
                console.error("Netzwerkfehler:", error);
                alert("Netzwerkfehler: Falls du die Datei lokal öffnest, blockiert dein Browser den Upload (CORS-Fehler). Nutze einen Webserver oder CodePen.");
            } finally {
                btnShare.innerHTML = originalBtnText;
                btnShare.disabled = false;
            }
        }, 'image/jpeg', 0.8);
    }

    // Hilfsfunktionen für Farben
    function rgbToHex(r, g, b) {
        return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) h = s = 0;
        else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return [h * 360, s * 100, l * 100];
    }

    function hslToHex(h, s, l) {
        l /= 100;
        const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
    }

    function updatePalette(hsl) {
        paletteList.innerHTML = '';
        const compHue = (hsl[0] + 180) % 360;
        const palette = [
            hslToHex(compHue, hsl[1], Math.min(hsl[2] + 20, 85)),
            hslToHex(compHue, hsl[1], hsl[2]),
            hslToHex(compHue, hsl[1], Math.max(hsl[2] - 20, 15)),
            hslToHex((hsl[0] + 30) % 360, hsl[1], hsl[2]),
            hslToHex((hsl[0] - 30) % 360, hsl[1], hsl[2])
        ];
        palette.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'swatch';
            swatch.style.backgroundColor = color;
            swatch.innerHTML = `<span>${color}</span>`;
            paletteList.appendChild(swatch);
        });
    }
</script>

</body>
</html>
