<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galton-Brett Simulation</title>
    <style>
        :root {
            --bg-gray: #d4d4d4;
            --win-border: #808080;
            --accent-blue: #0077b6;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: #222;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg-gray);
            align-items: center;
        }

        .canvas-area {
            flex-grow: 1;
            width: calc(100% - 30px);
            margin: 20px 15px 10px 15px;
            border: 3px solid #555;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        canvas { display: block; width: 100%; height: 100%; }

        .progress-wrapper {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .progress-container {
            background: #bbb;
            height: 24px;
            border-radius: 12px;
            border: 1px solid #888;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #48cae4, #0077b6);
            transition: width 0.2s ease-out;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            line-height: 24px;
            color: #000;
        }

        .footer {
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            background: #ccc;
            border-top: 2px solid #999;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            color: #333;
            font-size: 18px;
        }

        input {
            width: 80px;
            padding: 8px;
            border-radius: 6px;
            border: 2px solid #888;
            font-size: 18px;
            text-align: center;
            background: #fff;
        }

        button {
            padding: 12px 60px;
            border-radius: 30px;
            background: linear-gradient(to bottom, #fff, #999);
            border: 2px solid #444;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="canvas-area" id="canvasWrapper">
        <canvas id="galtonCanvas"></canvas>
    </div>

    <div class="progress-wrapper">
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">Bereit zum Start</div>
        </div>
    </div>

    <div class="footer">
        <div class="input-group">
            Anzahl Kugeln:
            <input type="number" id="ballCount" value="1000" min="1">
        </div>
        <button onclick="startSimulation()">START</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('galtonCanvas');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('canvasWrapper');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    let isRunning = false;
    let ballsToSpawn = 0;
    let totalToSpawn = 0;
    let activeBalls = [];
    let bins = [];
    let pegs = [];
    let lastSpawnTime = 0;
    let showCurve = false;
    
    const rows = 12; 
    const cols = 13;
    const pegRadius = 4;
    const ballRadius = 6; 
    const gravity = 0.38;

    window.onload = resize;
    window.onresize = resize;

    function resize() {
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
        const spacingX = Math.min(canvas.width / (cols + 2), 60);
        progressContainer.style.width = (spacingX * cols) + "px";
        initBoard();
        drawScene();
    }

    function initBoard() {
        pegs = [];
        bins = new Array(cols).fill(0);
        const spacingX = Math.min(canvas.width / (cols + 2), 60);
        const spacingY = Math.min((canvas.height * 0.45) / rows, 40);
        const startX = canvas.width / 2;
        const startY = 50;

        for (let r = 0; r < rows; r++) {
            for (let i = 0; i <= r; i++) {
                pegs.push({ x: startX - (r * spacingX / 2) + (i * spacingX), y: startY + (r * spacingY) });
            }
        }
    }

    function normalPDF(x, mu, sigma) {
        return (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
    }

    function drawScene() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const spacingX = Math.min(canvas.width / (cols + 2), 60);
        const leftEdge = (canvas.width / 2) - (spacingX * (cols/2));
        const chartBaseY = canvas.height - 20;
        const maxChartHeight = canvas.height * 0.35;

        // "Fächer" Andeutung (Bodenlinien)
        ctx.strokeStyle = "#eee";
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i = 0; i <= cols; i++) {
            const x = leftEdge + (i * spacingX);
            ctx.moveTo(x, chartBaseY);
            ctx.lineTo(x, chartBaseY - 10);
        }
        ctx.stroke();

        // Balken
        bins.forEach((count, i) => {
            const x = leftEdge + (i * spacingX);
            const h = (count / (totalToSpawn || 1000)) * (maxChartHeight * 4); 
            
            // Balken zeichnen
            ctx.fillStyle = "rgba(0, 119, 182, 0.8)";
            ctx.fillRect(x + 2, chartBaseY - h, spacingX - 4, h);
            
            // Zahl in den Balken schreiben
            if (count > 0) {
                ctx.fillStyle = h > 20 ? "#fff" : "#333"; // Farbe wechseln wenn Balken zu klein
                ctx.font = "bold 12px Arial";
                ctx.textAlign = "center";
                const textY = h > 20 ? chartBaseY - h/2 + 5 : chartBaseY - h - 5;
                ctx.fillText(count, x + spacingX/2, textY);
            }
        });

        // Nägel
        pegs.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, pegRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#cc0000"; ctx.fill();
            ctx.strokeStyle = "#600"; ctx.stroke();
        });

        // Glockenkurve
        if (showCurve) {
            ctx.beginPath();
            ctx.strokeStyle = "rgba(255, 0, 0, 0.8)";
            ctx.lineWidth = 5;
            const mu = cols / 2 - 0.5;
            const sigma = Math.sqrt(rows * 0.25);
            const theoretMax = normalPDF(mu, mu, sigma);
            const scaleFactor = maxChartHeight / theoretMax;

            for (let i = 0; i < cols * 10; i++) {
                let xIdx = i / 10;
                let xPos = leftEdge + (xIdx * spacingX) + spacingX/2;
                let yVal = normalPDF(xIdx, mu, sigma) * scaleFactor;
                let yPos = chartBaseY - yVal;
                if (i === 0) ctx.moveTo(xPos, yPos);
                else ctx.lineTo(xPos, yPos);
            }
            ctx.stroke();
        }
    }

    class Ball {
        constructor() {
            this.x = canvas.width / 2;
            this.y = 10; this.vx = (Math.random() - 0.5); this.vy = 0;
            this.lastPeg = null; this.isFinished = false;
        }

        update() {
            if (this.isFinished) return;
            this.vy += gravity; this.x += this.vx; this.y += this.vy;
            this.vx *= 0.99;

            pegs.forEach(p => {
                const dx = this.x - p.x; const dy = this.y - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < ballRadius + pegRadius && this.lastPeg !== p) {
                    this.lastPeg = p;
                    const dir = Math.random() > 0.5 ? 1 : -1;
                    this.vy *= -0.15; this.vx = dir * 2.6; this.y = p.y - 1;
                }
            });

            if (this.y > canvas.height - 20) {
                this.isFinished = true;
                bins[this.getBinIndex()]++;
                updateProgress();
            }
        }

        getBinIndex() {
            const spacingX = Math.min(canvas.width / (cols + 2), 60);
            const leftEdge = (canvas.width / 2) - (spacingX * (cols/2));
            return Math.max(0, Math.min(cols - 1, Math.floor((this.x - leftEdge) / spacingX)));
        }

        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = "#48cae4"; ctx.fill(); 
            ctx.strokeStyle = "#0077b6"; ctx.stroke();
        }
    }

    function updateProgress() {
        const finishedCount = bins.reduce((a, b) => a + b, 0);
        const percent = Math.min(100, Math.round((finishedCount / totalToSpawn) * 100));
        progressBar.style.width = percent + "%";
        progressText.innerText = percent + "% (" + finishedCount + " / " + totalToSpawn + ")";
        if (finishedCount === totalToSpawn) showCurve = true;
    }

    function startSimulation() {
        bins = new Array(cols).fill(0);
        activeBalls = [];
        showCurve = false;
        totalToSpawn = parseInt(document.getElementById('ballCount').value);
        ballsToSpawn = totalToSpawn;
        isRunning = true;
        lastSpawnTime = performance.now();
        animate();
    }

    function animate(currentTime) {
        drawScene();
        const spawnInterval = (45 * 1000) / totalToSpawn; 
        if (ballsToSpawn > 0 && currentTime - lastSpawnTime > spawnInterval) {
            activeBalls.push(new Ball());
            ballsToSpawn--;
            lastSpawnTime = currentTime;
        }
        activeBalls.forEach((ball, index) => {
            ball.update();
            ball.draw();
            if (ball.isFinished) activeBalls.splice(index, 1);
        });
        if (isRunning) requestAnimationFrame(animate);
    }
</script>
</body>
</html>
