<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Komplementärfarbe</title>
    <style>
        :root {
            --bg-gray: #f4f4f7;
            --panel-bg: #ffffff;
            --border-radius: 12px;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg-gray);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 400px; /* iPhone 13 Breite */
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-sizing: border-box;
        }

        /* Farbwähler Sektion */
        .picker-card {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            width: 100% !important;
            height: auto !important;
            aspect-ratio: 1 / 0.8;
            border-radius: 8px;
            touch-action: none; /* Wichtig für flüssiges Ziehen auf Mobile */
            border: 1px solid #ddd;
        }

        .hex-display {
            margin-top: 15px;
            font-family: 'SF Mono', Menlo, monospace;
            font-size: 1.4rem;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
        }

        /* Palette Sektion (jetzt unter dem Picker) */
        .palette-card {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .main-preview {
            width: 100%;
            height: 60px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .palette-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .swatch {
            height: 45px;
            width: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
            color: #fff;
            font-family: monospace;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="picker-card">
        <span class="section-title">Farbwahl</span>
        <canvas id="colorCanvas"></canvas>
        <div id="hexText" class="hex-display">#FFFFFF</div>
    </div>

    <div class="palette-card">
        <span class="section-title">Ausgewählte Farbe</span>
        <div id="mainPreview" class="main-preview">#FFFFFF</div>
        
        <span class="section-title">Komplementär & Analog</span>
        <div id="paletteList" class="palette-list">
            </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('colorCanvas');
    const ctx = canvas.getContext('2d');
    const hexText = document.getElementById('hexText');
    const mainPreview = document.getElementById('mainPreview');
    const paletteList = document.getElementById('paletteList');

    // Canvas für High-DPI (Retina) vorbereiten
    function setupCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        drawPicker(rect.width, rect.height);
    }

    function drawPicker(w, h) {
        // Regenbogen
        const hueGrad = ctx.createLinearGradient(0, 0, w, 0);
        hueGrad.addColorStop(0, "red");
        hueGrad.addColorStop(0.17, "orange");
        hueGrad.addColorStop(0.33, "yellow");
        hueGrad.addColorStop(0.5, "green");
        hueGrad.addColorStop(0.67, "cyan");
        hueGrad.addColorStop(0.83, "blue");
        hueGrad.addColorStop(1, "magenta");
        ctx.fillStyle = hueGrad;
        ctx.fillRect(0, 0, w, h);

        // Licht/Schatten Überlagerung
        const whiteGrad = ctx.createLinearGradient(0, 0, 0, h/2);
        whiteGrad.addColorStop(0, "white");
        whiteGrad.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = whiteGrad;
        ctx.fillRect(0, 0, w, h/2);

        const blackGrad = ctx.createLinearGradient(0, h/2, 0, h);
        blackGrad.addColorStop(0, "rgba(0,0,0,0)");
        blackGrad.addColorStop(1, "black");
        ctx.fillStyle = blackGrad;
        ctx.fillRect(0, h/2, w, h/2);
    }

    function rgbToHex(r, g, b) {
        return "#" + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) h = s = 0;
        else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return [h * 360, s * 100, l * 100];
    }

    function hslToHex(h, s, l) {
        l /= 100;
        const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
    }

    function handleInteraction(e) {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        let x = (clientX - rect.left) * dpr;
        let y = (clientY - rect.top) * dpr;

        // Sicherstellen, dass die Koordinaten im Canvas bleiben
        x = Math.max(0, Math.min(canvas.width - 1, x));
        y = Math.max(0, Math.min(canvas.height - 1, y));

        const data = ctx.getImageData(x, y, 1, 1).data;
        const hex = rgbToHex(data[0], data[1], data[2]);
        const hsl = rgbToHsl(data[0], data[1], data[2]);

        hexText.textContent = hex;
        mainPreview.style.backgroundColor = hex;
        mainPreview.textContent = hex;

        updatePalette(hsl);
    }

    function updatePalette(hsl) {
        paletteList.innerHTML = '';
        const compHue = (hsl[0] + 180) % 360;
        
        const palette = [
            hslToHex(compHue, hsl[1], Math.min(hsl[2] + 15, 85)), // Hell
            hslToHex(compHue, hsl[1], hsl[2]),                   // Basis
            hslToHex(compHue, hsl[1], Math.max(hsl[2] - 15, 15)), // Dunkel
            hslToHex((hsl[0] + 30) % 360, hsl[1], hsl[2]),        // Analog +
            hslToHex((hsl[0] - 30) % 360, hsl[1], hsl[2])         // Analog -
        ];

        palette.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'swatch';
            swatch.style.backgroundColor = color;
            swatch.innerHTML = `<span>Code:</span> <span>${color}</span>`;
            paletteList.appendChild(swatch);
        });
    }

    // Touch & Mouse Events
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInteraction(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleInteraction(e); });
    canvas.addEventListener('mousedown', (e) => { 
        const move = (ev) => handleInteraction(ev);
        const up = () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseup', up); };
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', up);
        handleInteraction(e);
    });

    window.onload = setupCanvas;
    window.onresize = setupCanvas;
</script>

</body>
</html>
