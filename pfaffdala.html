<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pfaffdala</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- STANDARD-DESIGN FÜR DESKTOP PC (GROSS) --- */
        body, html {
            margin: 0; padding: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #f3ecd8 0%, #e0cfaa 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            display: flex; justify-content: center; align-items: flex-start;
        }

        #rotateOverlay { display: none; }

        #app-container {
            display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 1000px;
            padding: 40px 20px;
            gap: 15px;
        }

        /* 1. OBERE LEISTE (PC) */
        .panel-info {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; background: #cbba8c; border-radius: 60px;
            padding: 10px 25px; border: 3px solid #4a341a;
        }
        .score-box { display: flex; gap: 20px; }
        .score { background: #fef3cf; padding: 5px 20px; border-radius: 40px; font-weight: bold; font-size: 1.2rem; box-shadow: inset 0 0 0 2px #b97f2e;}
        .score span { color: #c25d0a; font-size: 1.5rem; margin-left: 8px;}
        
        .controls-top { display: flex; gap: 20px; align-items: center;}
        .speed-control { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: bold; }
        button.top-btn { font-size: 1.1rem; padding: 6px 20px; background: #5e3a1c; color: #ffecb3; border: none; border-radius: 40px; font-weight: bold; cursor: pointer;}

        /* 2. MITTLERER BEREICH (PC) */
        .panel-center {
            display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px;
        }
        .status {
            background: #2c2820; color: #ffecb3;
            padding: 12px 25px; border-radius: 60px;
            font-size: 1.1rem; font-weight: bold; text-align: center;
            width: 90%;
        }
        .board { background: #c7af7a; border-radius: 50px; padding: 15px; border: 6px solid #4f3218; width: 100%; }
        .player-zone { padding: 10px; border-radius: 40px; transition: background 0.2s; }
        .active-p1 { background: #b1d481; box-shadow: 0 0 0 3px #2e6b2f; }
        .active-p2 { background: #7fa5cf; box-shadow: 0 0 0 3px #1b4f8b; }
        
        .divider { height: 6px; background: repeating-linear-gradient(90deg, #5a3c1a, #5a3c1a 12px, #ffeaab 12px, #ffeaab 24px); margin: 10px 0; border-radius: 4px; }
        .row { display: flex; justify-content: center; gap: 12px; margin: 8px 0; }

        .pit {
            background: radial-gradient(circle at 35% 35%, #fff8e7, #e7cf97);
            border-radius: 35px; border: 3px solid #412f14;
            width: 85px; height: 115px; 
            padding: 10px 6px 8px 6px; 
            cursor: pointer; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
            box-shadow: 0 5px 0 #7a562c;
        }
        .pit:active { transform: translateY(2px); box-shadow: 0 2px 0 #7a562c; }
        .pit.empty { opacity: 0.5; cursor: not-allowed; }
        .pit.selected { background: radial-gradient(circle at 30% 30%, #ffdd77, #ffaa33); transform: scale(1.05); box-shadow: 0 0 0 3px #ff7700; z-index: 10;}

        .balls { display: flex; flex-wrap: wrap; justify-content: center; align-content: flex-start; gap: 2px; width: 54px; height: 38px; margin: 0 auto; }
        .ball { width: 16px; height: 16px; background: radial-gradient(circle at 35% 35%, #d66b2a, #943e0c); border-radius: 50%; }
        .stone-count { font-size: 0.85rem; font-weight: bold; background: #2f2a1f; color: #ffeaac; padding: 2px 10px; border-radius: 20px; }

        /* 3. UNTERE LEISTE (PC) */
        .panel-actions { display: flex; justify-content: center; gap: 20px; width: 100%; }
        .action-btn { font-family: monospace; font-size: 1.2rem; font-weight: bold; padding: 10px 40px; background: #fff2df; border: 3px solid #3e2a12; border-radius: 60px; cursor: pointer; box-shadow: 0 4px 0 #8b5a2e; transition: all 0.2s; }
        .action-btn:active:not(:disabled) { transform: translateY(3px); box-shadow: 0 1px 0 #8b5a2e; }
        .action-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: 0 2px 0 #8b5a2e; transform: translateY(2px);}

        /* --- ZWINGT SMARTPHONES IM HOCHFORMAT ZUM DREHEN --- */
        @media (max-width: 800px) and (orientation: portrait) {
            #rotateOverlay {
                display: flex; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
                background: #2c281c; color: #ffdd99; z-index: 9999;
                align-items: center; justify-content: center; flex-direction: column;
                font-size: 1.5rem; text-align: center; padding: 20px;
            }
            #rotateOverlay span { font-size: 4rem; margin-bottom: 20px; animation: spin 2s infinite ease-in-out;}
            @keyframes spin { 0% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } 100% { transform: rotate(90deg); } }
            #app-container { display: none; }
        }

        /* --- WIDESCREEN-MODUS FÜR IPHONE QUERFORMAT --- */
        @media (max-height: 500px) and (orientation: landscape) {
            body, html {
                height: 100dvh; overflow: hidden; touch-action: none;
                align-items: center;
            }
            
            #app-container {
                flex-direction: row; 
                align-items: stretch; 
                justify-content: center; 
                gap: 20px; 
                height: 100%;
                padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
            }

            /* LEISTE 1 (LINKS) */
            .panel-info {
                flex-direction: column; 
                justify-content: space-between; 
                gap: 12px;
                width: 130px; 
                flex-shrink: 0; 
                height: 100%; 
                padding: 15px 10px; 
                border-radius: 20px; border-width: 2px;
            }
            .score-box { flex-direction: column; gap: 12px; flex-grow: 1; justify-content: space-evenly; }
            .score { 
                padding: 10px 5px; 
                font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; 
                justify-content: center; text-align: center; border-radius: 15px; 
                height: 100%; width: 100%; 
            }
            .score span { font-size: 1.8rem; margin-left: 0; margin-top: 5px;}
            
            .controls-top { flex-direction: column; gap: 10px; width: 100%; }
            .speed-control { flex-direction: column; font-size: 0.8rem; gap: 4px; }
            .speed-control input { width: 90%; }
            button.top-btn { 
                padding: 10px 5px; 
                font-size: 0.9rem; width: 100%; border-radius: 15px; box-shadow: 0 3px 0 #3e2a12;
            }
            button.top-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #3e2a12; }

            /* MITTLERER BEREICH (SPIELFELD) */
            .panel-center {
                flex-grow: 1; 
                max-width: 650px; 
                height: 100%; justify-content: center; gap: 6px;
            }
            .status { padding: 4px 10px; font-size: 0.85rem; width: 100%; border-radius: 12px; }

            .board { padding: 8px 10px; border-width: 3px; border-radius: 20px; width: 100%; }
            .player-zone { padding: 3px; border-radius: 15px; }
            .divider { height: 4px; margin: 3px 0; }
            .row { gap: 6px; margin: 3px 0; flex-wrap: nowrap; } 
            
            .pit {
                width: 60px; 
                min-width: 60px;
                height: 72px; 
                border-radius: 12px; border-width: 2px;
                padding: 4px 2px; box-shadow: 0 2px 0 #7a562c;
                flex-shrink: 0; 
                display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            }

            .balls { width: 42px; height: 28px; gap: 2px; margin: 0 auto; }
            .ball { width: 12px; height: 12px; }
            .stone-count { font-size: 0.75rem; padding: 1px 6px; border-radius: 8px; }

            /* LEISTE 3 (RECHTS) */
            .panel-actions {
                flex-direction: column; 
                justify-content: space-between; 
                gap: 15px; 
                width: 160px; 
                flex-shrink: 0; 
                height: 100%; 
            }
            .action-btn { 
                flex-grow: 1; 
                padding: 10px 5px; 
                font-size: 1.1rem; 
                border-width: 3px; border-radius: 20px; 
                box-shadow: 0 4px 0 #8b5a2e; 
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div id="rotateOverlay">
    <span>🔄</span>
    Bitte drehe dein Gerät in das Querformat!
</div>

<div id="app-container">
    
    <!-- LEISTE 1 (Am Desktop: Oben / Am Handy: Links) -->
    <div class="panel-info">
        <div class="score-box">
            <!-- P1 und P2 Text getauscht: P1 ist jetzt oben -->
            <div class="score">P1 (Oben)<br>Steine:<span id="scoreP1">32</span></div>
            <div class="score">P2 (Unten)<br>Steine:<span id="scoreP2">32</span></div>
        </div>
        <div class="controls-top">
            <div class="speed-control">
                🐢 <input type="range" id="speedSlider" min="1" max="10" value="5"> 🐇
            </div>
            <button class="top-btn" id="resetBtn">⟳ NEU</button>
        </div>
    </div>

    <!-- BEREICH 2 (Mitte) -->
    <div class="panel-center">
        <!-- Text auf obere Reihen angepasst -->
        <div class="status" id="gameStatus">Spieler 1 – Wähle eine Mulde (obere Reihen)</div>
        <div class="board">
            <!-- SPIELER 1 IST JETZT OBEN (Zeile 0 und 1) -->
            <div class="player-zone" id="zoneP1">
                <div class="row" id="row0"></div>
                <div class="row" id="row1"></div>
            </div>
            <div class="divider"></div>
            <!-- SPIELER 2 IST JETZT UNTEN (Zeile 2 und 3) -->
            <div class="player-zone" id="zoneP2">
                <div class="row" id="row2"></div>
                <div class="row" id="row3"></div>
            </div>
        </div>
    </div>

    <!-- LEISTE 3 (Am Desktop: Unten / Am Handy: Rechts) -->
    <div class="panel-actions">
        <button class="action-btn" id="btnLeft" disabled>⬅️ LINKS</button>
        <button class="action-btn" id="btnRight" disabled>➡️ RECHTS</button>
    </div>

</div>

<script>
    const COLS = 8;
    const ROWS = 4;
    let board = Array(ROWS).fill().map(() => Array(COLS).fill(2));
    let currentPlayer = 1;
    let scores = {1: 0, 2: 0};
    let gameActive = true;
    let selectedPit = null;
    let animationInProgress = false;

    const BASE_DELAY_STEP = 375;
    const BASE_DELAY_PAUSE = 500; 
    const delay = ms => new Promise(res => setTimeout(res, ms));

    const statusDiv = document.getElementById('gameStatus');
    const scoreP1span = document.getElementById('scoreP1');
    const scoreP2span = document.getElementById('scoreP2');
    const speedSlider = document.getElementById('speedSlider');

    const btnLeft = document.getElementById('btnLeft');
    const btnRight = document.getElementById('btnRight');

    function getCurrentDelay(baseAmount) {
        const speedVal = parseInt(speedSlider.value);
        const speedMap = {1: 3.0, 2: 2.5, 3: 2.0, 4: 1.5, 5: 1.0, 6: 0.7, 7: 0.4, 8: 0.2, 9: 0.1, 10: 0.02};
        return baseAmount * speedMap[speedVal];
    }

    function updateScoreUI() {
        let p1TotalStones = scores[1];
        let p2TotalStones = scores[2];

        for (let r = 0; r < 2; r++) {
            for (let c = 0; c < COLS; c++) {
                p1TotalStones += board[r][c];
            }
        }
        for (let r = 2; r < 4; r++) {
            for (let c = 0; c < COLS; c++) {
                p2TotalStones += board[r][c];
            }
        }

        scoreP1span.innerText = p1TotalStones;
        scoreP2span.innerText = p2TotalStones;
    }

    function getNextPosition(row, col, direction, player) {
        if (player === 1) {
            if (direction === 'right') {
                if (row === 1 && col < COLS-1) return { row: 1, col: col+1 };
                if (row === 1 && col === COLS-1) return { row: 0, col: COLS-1 };
                if (row === 0 && col > 0) return { row: 0, col: col-1 };
                if (row === 0 && col === 0) return { row: 1, col: 0 };
            } else {
                if (row === 1 && col > 0) return { row: 1, col: col-1 };
                if (row === 1 && col === 0) return { row: 0, col: 0 };
                if (row === 0 && col < COLS-1) return { row: 0, col: col+1 };
                if (row === 0 && col === COLS-1) return { row: 1, col: COLS-1 };
            }
        } else {
            if (direction === 'right') {
                if (row === 2 && col < COLS-1) return { row: 2, col: col+1 };
                if (row === 2 && col === COLS-1) return { row: 3, col: COLS-1 };
                if (row === 3 && col > 0) return { row: 3, col: col-1 };
                if (row === 3 && col === 0) return { row: 2, col: 0 };
            } else {
                if (row === 2 && col > 0) return { row: 2, col: col-1 };
                if (row === 2 && col === 0) return { row: 3, col: 0 };
                if (row === 3 && col < COLS-1) return { row: 3, col: col+1 };
                if (row === 3 && col === COLS-1) return { row: 2, col: COLS-1 };
            }
        }
        return { row, col };
    }

    function isInnerPit(player, row) { return (player === 1) ? (row === 1) : (row === 2); }
    
    function getOppositeFrontPit(player, col) {
        if (player === 1) return { row: 2, col: col };
        else return { row: 1, col: col };
    }

    async function sowStones(player, direction, startRow, startCol, count) {
        let remaining = count; let currentRow = startRow; let currentCol = startCol;
        let lastRow = startRow, lastCol = startCol;

        while (remaining > 0) {
            let next = getNextPosition(currentRow, currentCol, direction, player);
            currentRow = next.row; currentCol = next.col;
            board[currentRow][currentCol]++; remaining--;
            renderBoard();
            
            await delay(getCurrentDelay(BASE_DELAY_STEP));
            
            if (remaining === 0) { lastRow = currentRow; lastCol = currentCol; }
        }
        return { lastRow, lastCol };
    }

    async function performMove(player, startRow, startCol, direction) {
        let stones = board[startRow][startCol];
        if (stones === 0) return;
        
        board[startRow][startCol] = 0; renderBoard();
        await delay(getCurrentDelay(BASE_DELAY_PAUSE));

        let currentRow = startRow; let currentCol = startCol; let remainingStones = stones;

        while (true) {
            const { lastRow, lastCol } = await sowStones(player, direction, currentRow, currentCol, remainingStones);
            let currentStones = board[lastRow][lastCol];

            if (currentStones === 1) {
                statusDiv.innerText = `🛑 Letzter Stein in leerer Mulde. Zug beendet.`;
                break;
            }

            if (isInnerPit(player, lastRow)) {
                const opp = getOppositeFrontPit(player, lastCol);
                const stolen = board[opp.row][opp.col];
                
                if (stolen > 0) {
                    board[opp.row][opp.col] = 0; 
                    statusDiv.innerText = `🌾 Klauen! ${stolen} Stein(e) erbeutet!`;
                    renderBoard(); await delay(getCurrentDelay(BASE_DELAY_PAUSE));
                    
                    currentStones += stolen; board[lastRow][lastCol] = currentStones;
                    renderBoard(); await delay(getCurrentDelay(BASE_DELAY_PAUSE));
                }
            }

            statusDiv.innerText = `🔄 Kaskade! ${currentStones} Steine weiterverteilen...`;
            board[lastRow][lastCol] = 0; remainingStones = currentStones;
            currentRow = lastRow; currentCol = lastCol;
            
            renderBoard(); await delay(getCurrentDelay(BASE_DELAY_PAUSE));
        }
    }

    async function onDirectionChosen(direction) {
        if (!gameActive || animationInProgress || !selectedPit) return;
        
        const { row, col } = selectedPit; const player = currentPlayer;
        
        animationInProgress = true;
        setButtonsState(false); 
        selectedPit = null;

        await performMove(player, row, col, direction);
        currentPlayer = (currentPlayer === 1) ? 2 : 1;
        renderBoard();

        if (checkGameOverAfterMove()) {
            animationInProgress = false; return;
        }

        if (gameActive) {
            statusDiv.innerText = `🎲 Spieler ${currentPlayer} (${currentPlayer === 1 ? "oben" : "unten"}) – Wähle eine Mulde`;
        }
        animationInProgress = false; renderBoard();
    }

    function playerHasAnyStone(player) {
        const rows = (player === 1) ? [0,1] : [2,3];
        for (let r of rows) for (let c = 0; c < COLS; c++) if (board[r][c] > 0) return true;
        return false;
    }

    function awardRemainingTo(winnerPlayer) {
        let total = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) { total += board[r][c]; board[r][c] = 0; }
        }
        scores[winnerPlayer] += total; 
        updateScoreUI();
        statusDiv.innerText = `🏁 Spieler ${winnerPlayer} erhält ${total} Rest-Steine und gewinnt!`;
    }

    function endGame(winner) {
        gameActive = false; animationInProgress = false;
        if (winner === 1) statusDiv.innerText = `🏆 SPIELER 1 GEWINNT (${scores[1]} : ${scores[2]}) 🏆`;
        else statusDiv.innerText = `🏆 SPIELER 2 GEWINNT (${scores[2]} : ${scores[1]}) 🏆`;
        setButtonsState(false);
        renderBoard();
    }

    function checkGameOverAfterMove() {
        if (!playerHasAnyStone(currentPlayer)) {
            const winner = (currentPlayer === 1) ? 2 : 1;
            awardRemainingTo(winner); endGame(winner); return true;
        }
        let empty = true;
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (board[r][c] !== 0) empty = false;
        
        if (empty) {
            if (scores[1] > scores[2]) endGame(1);
            else if (scores[2] > scores[1]) endGame(2);
            else statusDiv.innerText = "Unentschieden!";
            return true;
        }
        return false;
    }

    function setButtonsState(active, leftAction = null, rightAction = null) {
        btnLeft.disabled = !active;
        btnRight.disabled = !active;

        if (active) {
            btnLeft.onclick = () => onDirectionChosen(leftAction);
            btnRight.onclick = () => onDirectionChosen(rightAction);
        } else {
            btnLeft.onclick = null;
            btnRight.onclick = null;
        }
    }

    function showDirectionChoice() {
        const row = selectedPit.row;
        const isOuterRow = (row === 0 || row === 3);
        const leftAction = isOuterRow ? 'right' : 'left';
        const rightAction = isOuterRow ? 'left' : 'right';

        setButtonsState(true, leftAction, rightAction);
        statusDiv.innerText = `Richtung wählen: Links oder Rechts?`;
    }

    function handlePitClick(row, col) {
        if (!gameActive || animationInProgress) return;

        const isP1 = (row === 0 || row === 1);
        const isP2 = (row === 2 || row === 3);
        
        if (currentPlayer === 1 && !isP1) { statusDiv.innerText = "❌ Nur deine Mulden (oben) wählen!"; return; }
        if (currentPlayer === 2 && !isP2) { statusDiv.innerText = "❌ Nur deine Mulden (unten) wählen!"; return; }
        if (board[row][col] === 0) { statusDiv.innerText = "Mulde ist leer!"; return; }

        if (selectedPit !== null && selectedPit.row === row && selectedPit.col === col) {
            selectedPit = null;
            setButtonsState(false);
            statusDiv.innerText = `🎲 Spieler ${currentPlayer} (${currentPlayer === 1 ? "oben" : "unten"}) – Wähle eine Mulde`;
            renderBoard();
            return;
        }

        selectedPit = { row, col };
        renderBoard();
        showDirectionChoice();
    }

    function renderBoard() {
        for (let r = 0; r < ROWS; r++) {
            const rowDiv = document.getElementById(`row${r}`);
            if (!rowDiv) continue;
            rowDiv.innerHTML = '';
            for (let c = 0; c < COLS; c++) {
                const stones = board[r][c];
                const pitDiv = document.createElement('div');
                pitDiv.className = 'pit';
                if (stones === 0) pitDiv.classList.add('empty');
                if (selectedPit && selectedPit.row === r && selectedPit.col === c) pitDiv.classList.add('selected');

                const ballsDiv = document.createElement('div'); ballsDiv.className = 'balls';
                
                const maxBalls = 6; 
                const ballCount = stones > maxBalls ? maxBalls : stones;
                
                for (let i = 0; i < ballCount; i++) {
                    const ball = document.createElement('div'); ball.className = 'ball'; ballsDiv.appendChild(ball);
                }
                pitDiv.appendChild(ballsDiv);
                
                const countSpan = document.createElement('div'); countSpan.className = 'stone-count';
                countSpan.innerText = `${stones}`; pitDiv.appendChild(countSpan);
                pitDiv.addEventListener('click', (function(r,c){ return function(){ handlePitClick(r,c); }; })(r,c));
                rowDiv.appendChild(pitDiv);
            }
        }
        
        const p1zone = document.getElementById('zoneP1'); const p2zone = document.getElementById('zoneP2');
        if (currentPlayer === 1) { p1zone.classList.add('active-p1'); p2zone.classList.remove('active-p2'); } 
        else { p2zone.classList.add('active-p2'); p1zone.classList.remove('active-p1'); }

        updateScoreUI();
    }

    function resetGame() {
        if (animationInProgress) return;
        board = Array(ROWS).fill().map(() => Array(COLS).fill(2));
        scores = {1: 0, 2: 0}; currentPlayer = 1; gameActive = true;
        selectedPit = null; animationInProgress = false;
        
        setButtonsState(false); renderBoard();
        statusDiv.innerText = "🔄 Spieler 1 beginnt (obere Reihen)";
    }

    document.getElementById('resetBtn').addEventListener('click', resetGame);
    resetGame();
</script>
</body>
</html>
