<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pfaffdala</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f3ecd8 0%, #e0cfaa 100%);
            font-family: 'Segoe UI', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* HIER IST DIE ÄNDERUNG: Statt 'center' starten wir oben ('flex-start') */
            justify-content: flex-start; 
            margin: 0;
            /* Fester Abstand nach oben (z.B. 40px), rechts, unten, links */
            padding: 40px 20px 50px 20px; 
            min-height: 100vh;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            background: #2c281c;
            display: inline-block;
            padding: 0 15px;
            border-radius: 60px;
            color: #ffdd99;
            text-align: center;
            margin: 5px 0;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 880px;
            background: #cbba8c;
            border-radius: 100px;
            padding: 5px 20px;
            margin: 10px 0;
            border: 3px solid #4a341a;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .score {
            background: #fef3cf;
            padding: 5px 20px;
            border-radius: 40px;
            box-shadow: inset 0 0 0 2px #b97f2e;
        }

        .score span {
            font-size: 1.6rem;
            margin-left: 8px;
            color: #c25d0a;
        }

        .status {
            background: #2c2820;
            color: #ffecb3;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
            width: 90%;
            max-width: 750px;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin: 10px 0;
            min-height: 70px;
            align-items: center;
            justify-content: center;
        }

        button {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 6px 24px;
            background: #fff2df;
            border: 3px solid #3e2a12;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 4px 0 #8b5a2e;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b5a2e;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .cancel {
            background: #ffe0d0;
            border-color: #b12;
            color: #b12;
        }

        .reset {
            background: #5e3a1c;
            color: #ffecb3;
            border: none;
            margin: 20px 0; 
            box-shadow: none;
        }

        .board {
            background: #c7af7a;
            border-radius: 60px;
            padding: 15px;
            border: 6px solid #4f3218;
        }

        .player-zone {
            padding: 10px;
            border-radius: 40px;
            transition: background 0.2s;
        }

        .active-p1 {
            background: #b1d481;
            box-shadow: 0 0 0 3px #2e6b2f;
        }

        .active-p2 {
            background: #7fa5cf;
            box-shadow: 0 0 0 3px #1b4f8b;
        }

        .divider {
            height: 6px;
            background: repeating-linear-gradient(90deg, #5a3c1a, #5a3c1a 12px, #ffeaab 12px, #ffeaab 24px);
            margin: 10px 0;
            border-radius: 4px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .pit {
            background: radial-gradient(circle at 35% 35%, #fff8e7, #e7cf97);
            border-radius: 40px;
            border: 3px solid #412f14;
            width: 90px;
            height: 120px; 
            padding: 10px 6px 8px 6px; 
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            gap: 5px;
            box-shadow: 0 5px 0 #7a562c;
        }

        .pit:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #7a562c;
        }

        .pit.empty {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .pit.selected {
            background: radial-gradient(circle at 30% 30%, #ffdd77, #ffaa33);
            transform: scale(1.02);
            box-shadow: 0 0 0 3px #ff7700, 0 0 0 5px #ffdd88;
        }

        .balls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center; 
            gap: 3px;
            width: 100%;
            height: 65px; 
        }

        .ball {
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 35% 35%, #d66b2a, #943e0c);
            border-radius: 50%;
        }

        .stone-count {
            font-size: 0.85rem;
            font-weight: bold;
            background: #2f2a1f;
            color: #ffeaac;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: auto; 
        }
        
        .speed-control {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 0; 
            background: #cbba8c;
            padding: 10px 25px;
            border-radius: 40px;
            border: 3px solid #4a341a;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .speed-control input[type="range"] {
            width: 180px;
            cursor: pointer;
        }

        @media (max-width: 850px) {
            .pit { width: 70px; height: 100px; padding: 8px 4px 6px 4px; }
            .balls { height: 50px; }
            .ball { width: 14px; height: 14px; }
            .stone-count { font-size: 0.75rem; }
            button { font-size: 0.9rem; padding: 5px 16px; }
            .speed-control { flex-direction: column; gap: 5px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="score-panel">
    <div class="score">🌿 SPIELER 1 (UNTEN): <span id="scoreP1">0</span></div>
    <div class="score">🔥 SPIELER 2 (OBEN): <span id="scoreP2">0</span></div>
</div>
<div class="status" id="gameStatus">Spieler 1 – Wähle eine Mulde (untere Reihen)</div>
<div class="controls" id="directionControls"></div>
<div class="board">
    <div class="player-zone" id="zoneP2">
        <div class="row" id="row3"></div>
        <div class="row" id="row2"></div>
    </div>
    <div class="divider"></div>
    <div class="player-zone" id="zoneP1">
        <div class="row" id="row1"></div>
        <div class="row" id="row0"></div>
    </div>
</div>

<button class="reset" id="resetBtn">⟳ NEUES SPIEL</button>

<div class="speed-control">
    <span>🐢 Langsam</span>
    <input type="range" id="speedSlider" min="1" max="10" value="5">
    <span>🐇 Schnell</span>
</div>

<script>
    const COLS = 8;
    const ROWS = 4;
    let board = Array(ROWS).fill().map(() => Array(COLS).fill(2));
    let currentPlayer = 1;
    let scores = {1: 0, 2: 0};
    let gameActive = true;
    let selectedPit = null;
    let animationInProgress = false;

    const BASE_DELAY_STEP = 375;
    const BASE_DELAY_PAUSE = 500; 
    
    const delay = ms => new Promise(res => setTimeout(res, ms));

    const statusDiv = document.getElementById('gameStatus');
    const controlsDiv = document.getElementById('directionControls');
    const scoreP1span = document.getElementById('scoreP1');
    const scoreP2span = document.getElementById('scoreP2');
    const speedSlider = document.getElementById('speedSlider');

    function getCurrentDelay(baseAmount) {
        const speedVal = parseInt(speedSlider.value);
        const speedMap = {1: 3.0, 2: 2.5, 3: 2.0, 4: 1.5, 5: 1.0, 6: 0.7, 7: 0.4, 8: 0.2, 9: 0.1, 10: 0.02};
        return baseAmount * speedMap[speedVal];
    }

    function updateScoreUI() {
        scoreP1span.innerText = scores[1];
        scoreP2span.innerText = scores[2];
    }

    function getNextPosition(row, col, direction, player) {
        if (player === 1) {
            if (direction === 'right') {
                if (row === 1 && col < COLS-1) return { row: 1, col: col+1 };
                if (row === 1 && col === COLS-1) return { row: 0, col: COLS-1 };
                if (row === 0 && col > 0) return { row: 0, col: col-1 };
                if (row === 0 && col === 0) return { row: 1, col: 0 };
            } else {
                if (row === 1 && col > 0) return { row: 1, col: col-1 };
                if (row === 1 && col === 0) return { row: 0, col: 0 };
                if (row === 0 && col < COLS-1) return { row: 0, col: col+1 };
                if (row === 0 && col === COLS-1) return { row: 1, col: COLS-1 };
            }
        } else {
            if (direction === 'right') {
                if (row === 2 && col < COLS-1) return { row: 2, col: col+1 };
                if (row === 2 && col === COLS-1) return { row: 3, col: COLS-1 };
                if (row === 3 && col > 0) return { row: 3, col: col-1 };
                if (row === 3 && col === 0) return { row: 2, col: 0 };
            } else {
                if (row === 2 && col > 0) return { row: 2, col: col-1 };
                if (row === 2 && col === 0) return { row: 3, col: 0 };
                if (row === 3 && col < COLS-1) return { row: 3, col: col+1 };
                if (row === 3 && col === COLS-1) return { row: 2, col: COLS-1 };
            }
        }
        return { row, col };
    }

    function isOwnPit(player, row) {
        return (player === 1) ? (row === 0 || row === 1) : (row === 2 || row === 3);
    }

    function isInnerPit(player, row) {
        return (player === 1) ? (row === 1) : (row === 2);
    }

    function getOppositeFrontPit(player, col) {
        if (player === 1) return { row: 2, col: col };
        else return { row: 1, col: col };
    }

    async function sowStones(player, direction, startRow, startCol, count) {
        let remaining = count;
        let currentRow = startRow;
        let currentCol = startCol;
        let lastRow = startRow, lastCol = startCol;

        while (remaining > 0) {
            let next = getNextPosition(currentRow, currentCol, direction, player);
            currentRow = next.row;
            currentCol = next.col;
            board[currentRow][currentCol]++;
            remaining--;
            renderBoard();
            
            await delay(getCurrentDelay(BASE_DELAY_STEP));
            
            if (remaining === 0) {
                lastRow = currentRow;
                lastCol = currentCol;
            }
        }
        return { lastRow, lastCol };
    }

    async function performMove(player, startRow, startCol, direction) {
        let stones = board[startRow][startCol];
        
        if (stones === 0) {
            statusDiv.innerText = "Diese Mulde ist leer.";
            return;
        }
        
        board[startRow][startCol] = 0;
        renderBoard();
        await delay(getCurrentDelay(BASE_DELAY_PAUSE));

        let currentRow = startRow;
        let currentCol = startCol;
        let remainingStones = stones;

        while (true) {
            const { lastRow, lastCol } = await sowStones(player, direction, currentRow, currentCol, remainingStones);
            
            let currentStones = board[lastRow][lastCol];

            if (currentStones === 1) {
                statusDiv.innerText = `🛑 Der letzte Stein landete in einer leeren Mulde. Zug beendet.`;
                break;
            }

            if (isInnerPit(player, lastRow)) {
                const opp = getOppositeFrontPit(player, lastCol);
                const stolen = board[opp.row][opp.col];
                
                if (stolen > 0) {
                    board[opp.row][opp.col] = 0; 
                    statusDiv.innerText = `🌾 Klauen! ${stolen} Stein(e) erbeutet!`;
                    renderBoard();
                    await delay(getCurrentDelay(BASE_DELAY_PAUSE));
                    
                    currentStones += stolen;
                    board[lastRow][lastCol] = currentStones;
                    renderBoard();
                    await delay(getCurrentDelay(BASE_DELAY_PAUSE));
                }
            }

            statusDiv.innerText = `🔄 Kaskade! Nehme alle ${currentStones} Steine auf und verteile weiter...`;
            board[lastRow][lastCol] = 0;
            remainingStones = currentStones;
            
            currentRow = lastRow;
            currentCol = lastCol;
            
            renderBoard();
            await delay(getCurrentDelay(BASE_DELAY_PAUSE));
        }
    }

    async function onDirectionChosen(direction) {
        if (!gameActive || animationInProgress || !selectedPit) return;

        const { row, col } = selectedPit;
        const player = currentPlayer;

        animationInProgress = true;
        disableButtons(true);
        selectedPit = null;
        hideDirectionButtons();

        await performMove(player, row, col, direction);

        currentPlayer = (currentPlayer === 1) ? 2 : 1;

        renderBoard();

        if (checkGameOverAfterMove()) {
            animationInProgress = false;
            disableButtons(false);
            return;
        }

        if (gameActive) {
            statusDiv.innerText = `🎲 Spieler ${currentPlayer} (${currentPlayer === 1 ? "untere Reihen" : "obere Reihen"}) – Wähle eine Mulde`;
        }

        animationInProgress = false;
        disableButtons(false);
        renderBoard();
    }

    function playerHasAnyStone(player) {
        const rows = (player === 1) ? [0,1] : [2,3];
        for (let r of rows) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c] > 0) return true;
            }
        }
        return false;
    }

    function awardRemainingTo(winnerPlayer) {
        let total = 0;
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                total += board[r][c];
                board[r][c] = 0;
            }
        }
        scores[winnerPlayer] += total;
        updateScoreUI();
        statusDiv.innerText = `🏁 Spieler ${winnerPlayer} erhält alle restlichen ${total} Steine und gewinnt!`;
    }

    function endGame(winner) {
        gameActive = false;
        animationInProgress = false;
        if (winner === 1) statusDiv.innerText = `🏆 SPIELER 1 GEWINNT (${scores[1]} : ${scores[2]}) 🏆`;
        else statusDiv.innerText = `🏆 SPIELER 2 GEWINNT (${scores[2]} : ${scores[1]}) 🏆`;
        controlsDiv.innerHTML = '';
        renderBoard();
    }

    function checkGameOverAfterMove() {
        if (!playerHasAnyStone(currentPlayer)) {
            const winner = (currentPlayer === 1) ? 2 : 1;
            awardRemainingTo(winner);
            endGame(winner);
            return true;
        }
        let empty = true;
        for (let r = 0; r < ROWS; r++)
            for (let c = 0; c < COLS; c++)
                if (board[r][c] !== 0) empty = false;
        if (empty) {
            if (scores[1] > scores[2]) endGame(1);
            else if (scores[2] > scores[1]) endGame(2);
            else statusDiv.innerText = "Unentschieden!";
            return true;
        }
        return false;
    }

    function showDirectionChoice() {
        const row = selectedPit.row;
        const isOuterRow = (row === 0 || row === 3);

        const leftAction = isOuterRow ? 'right' : 'left';
        const rightAction = isOuterRow ? 'left' : 'right';

        controlsDiv.innerHTML = `
            <button id="btnLeft">⬅️ LINKS</button>
            <button id="btnRight">➡️ RECHTS</button>
            <button id="btnCancel" class="cancel">✖ ABBRECHEN</button>
        `;
        document.getElementById('btnLeft').onclick = () => onDirectionChosen(leftAction);
        document.getElementById('btnRight').onclick = () => onDirectionChosen(rightAction);
        document.getElementById('btnCancel').onclick = () => cancelSelection();
        statusDiv.innerText = `Spieler ${currentPlayer}: Wähle Richtung (Links/Rechts)`;
    }

    function hideDirectionButtons() {
        controlsDiv.innerHTML = '';
    }

    function cancelSelection() {
        if (!gameActive || animationInProgress) return;
        selectedPit = null;
        hideDirectionButtons();
        statusDiv.innerText = `🎲 Spieler ${currentPlayer} (${currentPlayer === 1 ? "untere Reihen" : "obere Reihen"}) – Wähle eine Mulde`;
        renderBoard();
    }

    function disableButtons(disabled) {
        const btns = document.querySelectorAll('#directionControls button');
        btns.forEach(btn => btn.disabled = disabled);
    }

    function handlePitClick(row, col) {
        if (!gameActive || animationInProgress) return;
        if (selectedPit !== null) return;

        const isP1 = (row === 0 || row === 1);
        const isP2 = (row === 2 || row === 3);
        if (currentPlayer === 1 && !isP1) {
            statusDiv.innerText = "❌ Du darfst nur deine eigenen Mulden (unten) wählen!";
            return;
        }
        if (currentPlayer === 2 && !isP2) {
            statusDiv.innerText = "❌ Du darfst nur deine eigenen Mulden (oben) wählen!";
            return;
        }
        
        if (board[row][col] === 0) {
            statusDiv.innerText = "Diese Mulde ist leer. Wähle eine Mulde mit mindestens einem Stein.";
            return;
        }

        selectedPit = { row, col };
        renderBoard();
        showDirectionChoice();
    }

    function renderBoard() {
        for (let r = 0; r < ROWS; r++) {
            const rowDiv = document.getElementById(`row${r}`);
            if (!rowDiv) continue;
            rowDiv.innerHTML = '';
            for (let c = 0; c < COLS; c++) {
                const stones = board[r][c];
                const pitDiv = document.createElement('div');
                pitDiv.className = 'pit';
                if (stones === 0) pitDiv.classList.add('empty');
                if (selectedPit && selectedPit.row === r && selectedPit.col === c) {
                    pitDiv.classList.add('selected');
                }

                const ballsDiv = document.createElement('div');
                ballsDiv.className = 'balls';
                const maxBalls = 9; 
                const ballCount = stones > maxBalls ? maxBalls : stones;
                
                for (let i = 0; i < ballCount; i++) {
                    const ball = document.createElement('div');
                    ball.className = 'ball';
                    ballsDiv.appendChild(ball);
                }
                
                pitDiv.appendChild(ballsDiv);
                
                const countSpan = document.createElement('div');
                countSpan.className = 'stone-count';
                countSpan.innerText = `${stones}`;
                pitDiv.appendChild(countSpan);

                pitDiv.addEventListener('click', (function(r,c){ return function(){ handlePitClick(r,c); }; })(r,c));
                rowDiv.appendChild(pitDiv);
            }
        }
        const p1zone = document.getElementById('zoneP1');
        const p2zone = document.getElementById('zoneP2');
        if (currentPlayer === 1) {
            p1zone.classList.add('active-p1');
            p2zone.classList.remove('active-p2');
        } else {
            p2zone.classList.add('active-p2');
            p1zone.classList.remove('active-p1');
        }
    }

    function resetGame() {
        if (animationInProgress) return;
        board = Array(ROWS).fill().map(() => Array(COLS).fill(2));
        scores = {1: 0, 2: 0};
        currentPlayer = 1;
        gameActive = true;
        selectedPit = null;
        animationInProgress = false;
        updateScoreUI();
        controlsDiv.innerHTML = '';
        renderBoard();
        statusDiv.innerText = "🔄 NEUSTART! Spieler 1 beginnt (untere Reihen)";
    }

    document.getElementById('resetBtn').addEventListener('click', resetGame);
    resetGame();
</script>
</body>
</html>
